<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style/style.css" />
  <title>Expense Tracker App</title>
</head>

<body>
  <div class="container">
    <div class="section1">
      <div class="logo">
        <img src="./image/logo-img.png" alt="logo" />
      </div>

      <h1>Expense Tracker App</h1>

      <div class="input-section">
        <div class="type">
          <label for="type-select">Type:</label>
          <select id="type-select">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>

        <div class="category">
          <label for="category-select">Category:</label>
          <input type="text" id="category-select" placeholder="Enter category" />
        </div>

        <div class="description">
          <label for="description-input">Description:</label>
          <input type="text" id="description-input" placeholder="Enter description" />
        </div>

        <div class="amount">
          <label for="amount-input">Amount:</label>
          <input type="number" id="amount-input" placeholder="Enter amount" />
        </div>

        <div class="date">
          <label for="date-input">Date:</label>
          <input type="date" id="date-input" />
        </div>

        <button id="add-btn">Add Transaction</button>
      </div>

      <div class="filters">
        <button id="filter-all" class="filter-btn active">All</button>
        <button id="filter-income" class="filter-btn">Income</button>
        <button id="filter-expense" class="filter-btn">Expense</button>
      </div>

      <canvas id="expense-chart" width="1000" height="500"></canvas>

      <div class="expenses-list">
        <h2>Transactions</h2>
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>Category</th>
              <th>Description</th>
              <th>Amount</th>
              <th>Date</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody id="expense-table-body"></tbody>
          <tfoot>
            <tr>
              <td colspan="3">Total Expense</td>
              <td id="total-expense"></td>
              <td colspan="2"></td>
            </tr>
            <tr>
              <td colspan="3">Total Income</td>
              <td id="total-income"></td>
              <td colspan="2"></td>
            </tr>
            <tr>
              <td colspan="3">Balance</td>
              <td id="total-balance"></td>
              <td colspan="2"></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>

</html>
